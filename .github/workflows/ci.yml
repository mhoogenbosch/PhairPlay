# CI Workflow — runs on every push and pull request.
# Builds both flavors (googletv, firetv) and runs unit tests.
# A green CI badge on every commit is required for release (AC-8.5).

name: CI

on:
  push:
    branches: [ "main", "develop", "claude/**" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up JDK 17 (required for AGP 8.x and Kotlin 1.9.x)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Step 3: Grant execute permission to the Gradle wrapper
      - name: Grant Gradle wrapper execute permission
        run: chmod +x gradlew

      # Step 4: Set up Android SDK with required components
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      # Step 5: Write local.properties (AGP requires sdk.dir to locate the Android SDK)
      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      # Step 6: Build the Google TV debug APK
      # This verifies that the googletv flavor compiles without errors
      - name: Build Google TV (debug)
        run: |
          mkdir -p app/build/reports
          ./gradlew assembleGoogletvDebug --stacktrace 2>&1 | tee app/build/reports/build-error.txt
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "=== BUILD FAILED ==="
            cat app/build/reports/build-error.txt
            # Emit key error lines as annotation
            ERROR=$(grep -n "error:\|Error:\|FAILURE:\|Exception\|Caused by:\|Could not\|could not\|unresolved\|Unresolved\|issues were found" app/build/reports/build-error.txt | grep -v "^[[:space:]]*at " | head -40)
            if [ -z "$ERROR" ]; then
              ERROR=$(tail -40 app/build/reports/build-error.txt)
            fi
            ERROR_MSG=$(echo "$ERROR" | tr '\n' '|' | sed 's/|$//;s/|/%0A/g')
            echo "::error title=assembleGoogletvDebug failed::${ERROR_MSG}"
          fi
          exit $BUILD_EXIT

      # Step 7: Build the Fire TV debug APK
      # This verifies that the firetv flavor compiles without errors
      - name: Build Fire TV (debug)
        run: |
          ./gradlew assembleFiretvDebug --stacktrace 2>&1 | tee app/build/reports/firetv-error.txt
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            ERROR=$(grep -n "error:\|Error:\|FAILURE:\|Exception\|Caused by:\|Could not\|unresolved\|Unresolved\|issues were found" app/build/reports/firetv-error.txt | grep -v "^[[:space:]]*at " | head -40)
            if [ -z "$ERROR" ]; then ERROR=$(tail -40 app/build/reports/firetv-error.txt); fi
            ERROR_MSG=$(echo "$ERROR" | tr '\n' '|' | sed 's/|$//;s/|/%0A/g')
            echo "::error title=assembleFiretvDebug failed::${ERROR_MSG}"
          fi
          exit $BUILD_EXIT

      # Step 8: Run unit tests for both flavors
      # Unit tests run on the build machine (no Android device needed)
      - name: Run unit tests
        run: |
          ./gradlew testGoogletvDebugUnitTest testFiretvDebugUnitTest --stacktrace 2>&1 | tee app/build/reports/test-error.txt
          TEST_EXIT=${PIPESTATUS[0]}
          if [ $TEST_EXIT -ne 0 ]; then
            ERROR=$(grep -n "error:\|Error:\|FAILURE:\|Exception\|Caused by:\|Could not\|failed\|FAILED\|unresolved\|Unresolved" app/build/reports/test-error.txt | grep -v "^[[:space:]]*at " | head -50)
            if [ -z "$ERROR" ]; then ERROR=$(tail -50 app/build/reports/test-error.txt); fi
            ERROR_MSG=$(echo "$ERROR" | tr '\n' '|' | sed 's/|$//;s/|/%0A/g')
            echo "::error title=Unit tests failed::${ERROR_MSG}"
          fi
          exit $TEST_EXIT

      # Step 9: Upload build reports as artifacts (includes error output and test results)
      - name: Upload build reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-reports
          path: app/build/reports/
          retention-days: 30
          if-no-files-found: ignore

      # Step 10: Upload APKs as artifacts (for manual testing on real devices)
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: debug-apks
          path: |
            app/build/outputs/apk/googletv/debug/app-googletv-debug.apk
            app/build/outputs/apk/firetv/debug/app-firetv-debug.apk
          retention-days: 7
