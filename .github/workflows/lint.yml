# Lint Workflow — runs Android Lint on every push and pull request.
# Helps maintain code quality and catch potential bugs early.

name: Lint

on:
  push:
    branches: [ "main", "develop", "claude/**" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  android-lint:
    name: Android Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Gradle wrapper execute permission
        run: chmod +x gradlew

      # Set up Android SDK with required components
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      # Run Android Lint — checks for correctness, security, and performance issues.
      # The lint configuration in app/build.gradle.kts controls what is reported.
      # See: https://developer.android.com/studio/write/lint
      - name: Run Android Lint
        run: ./gradlew lint

      # Upload the lint report so it's easy to review in GitHub
      - name: Upload Lint report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report
          path: app/build/reports/lint-results-*.html
          retention-days: 30
